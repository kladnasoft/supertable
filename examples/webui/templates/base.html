<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Data Island Core – {% block title %}{% endblock %}</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        xintegrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==
        "crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <!-- Base Styles (Bootstrap is optional, but included for existing styles) -->
  <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  {% block head_extra %}{% endblock %}

  <style>
    :root {
      --primary-color: #1c96ca;
      --primary-light: #e6f4fa;
      --secondary-color: #147ba3;
      --dark-color: #1a1a2e;
      --light-color: #f3f6fb;
      --text-color: #2b2d42;
      --text-light: #8d99ae;
      --panel-bg: #ffffff;
      --panel-border: #e0e5f0;
      --panel-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      --header-bg: #f8fafc;
      --data-table-header-bg: #f1f5f9;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text-color);
      background: #f3f6fb;
      min-height: 100vh;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ---------------- Layout ---------------- */
    .app-layout {
      display: block;
      min-height: 100vh;
    }

    /* Content area sits next to the fixed sidebar defined in sidebar.html */
    .content-container {
      margin-left: var(--sb-width, 280px);
      min-height: 100vh;
      background: #f3f6fb;
      transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      padding-bottom: 40px;
    }

    .sidebar-collapsed ~ .content-container {
      margin-left: var(--sb-collapsed-width, 80px);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .content-area {
      flex-grow: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .content-panel {
      background-color: var(--panel-bg);
      border-radius: 12px;
      box-shadow: var(--panel-shadow);
      border: 1px solid var(--panel-border);
      padding: 25px;
    }

    /* Common utilities */
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 11px; }
    .muted { color: var(--text-light); }
    .font-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    /* Buttons — Ghost (secondary actions) */
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--panel-border);
      color: #475569;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-ghost:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
      text-decoration: none;
      color: #475569;
    }

    /* Buttons — Primary */
    .btn-primary {
      background: var(--primary-color);
      color: #fff;
      border: 1px solid var(--primary-color);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-primary:hover { background: var(--secondary-color); border-color: var(--secondary-color); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Buttons — Danger */
    .btn-danger {
      background: #fef2f2;
      color: var(--red);
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .btn-danger:hover { background: #fee2e2; }

    /* Alert styles */
    .alert {
      padding: 10px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .alert-danger {
      background-color: #fef2f2;
      color: var(--red);
      border: 1px solid #fecaca;
    }
    .alert-success {
      background-color: #dcfce7;
      color: #16a34a;
      border: 1px solid #bbf7d0;
    }

    /* Standard table styles */
    .table-container {
        overflow-x: auto;
    }
    .table-container table {
        width: 100%;
        border-collapse: collapse;
    }
    .table-container th, .table-container td {
        padding: 8px 12px;
        text-align: left;
        border-bottom: 1px solid #f1f5f9;
    }
    .table-container th {
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #6b7280;
        border-bottom: 1px solid #e5e7eb;
        font-weight: 600;
        background: var(--data-table-header-bg);
    }
    .table-container tr:last-child td {
        border-bottom: none;
    }
    .table-container tbody tr:hover {
        background: var(--header-bg);
    }

    /* Chips / Badges */
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }
    .chip-default { background: #f3f4f6; color: #6b7280; }
    .chip-primary { background: var(--primary-light); color: var(--primary-color); }
    .chip-success { background: #dcfce7; color: #16a34a; }
    .chip-danger  { background: #fef2f2; color: var(--red); }
    .chip-warning { background: #fef9c3; color: #a16207; }

    /* JSON Modal Styles (reused from existing files) */
    #modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.65);
      z-index: 1000;
      display: none; /* Controlled by JS */
      align-items: center;
      justify-content: center;
    }

    #modal-card {
      background: var(--panel-bg);
      border-radius: 12px;
      max-width: 90vw;
      width: 600px;
      max-height: 90vh;
      display: block;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.4);
    }

    #m-header {
      padding: 14px 18px;
      border-bottom: 1px solid #e5e7eb;
      background: var(--header-bg);
      border-radius: 12px 12px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
    }

    #m-body {
      padding: 16px 18px;
      margin: 0;
      overflow: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
    }

  </style>
</head>
<body>
  <div class="app-layout">
    {% include "sidebar.html" %}

    <div class="content-container">
      <div class="wrap">
        {% block content %}{% endblock %}
      </div>
    </div>
  </div>

  {% block body_scripts %}{% endblock %}
</body>
</html>
