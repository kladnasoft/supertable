x-redis-common-env: &redis-common-env
  REDIS_PASSWORD: "${REDIS_PASSWORD:-change_me_to_a_strong_password}"
  REDIS_SENTINEL_RESOLVE_HOSTNAMES: "yes"
  REDIS_SENTINEL_ANNOUNCE_HOSTNAMES: "yes"

x-sentinel-common-env: &sentinel-common-env
  REDIS_MASTER_HOST: redis-master
  REDIS_MASTER_PORT_NUMBER: 6379
  REDIS_MASTER_PASSWORD: "${REDIS_PASSWORD:-change_me_to_a_strong_password}"
  REDIS_SENTINEL_PASSWORD: "${REDIS_PASSWORD:-change_me_to_a_strong_password}"
  REDIS_SENTINEL_MASTER_NAME: mymaster
  REDIS_SENTINEL_QUORUM: 2

# Default: redis-master + redis-replica-1 only
#   docker compose up -d
#
# With Sentinel HA (2 sentinel nodes):
#   docker compose --profile sentinel up -d
#
# With RedisInsight UI:
#   docker compose --profile insights up -d
#
# Sentinel + RedisInsight:
#   docker compose --profile sentinel --profile insights up -d

services:
  redis-master:
    image: bitnamilegacy/redis:8.2.1-debian-12-r0
    container_name: redis-master
    restart: unless-stopped
    environment:
      <<: *redis-common-env
      REDIS_REPLICATION_MODE: master
      ALLOW_EMPTY_PASSWORD: "no"
    volumes:
      - redis-master-data:/bitnami/redis/data
    networks:
      - supertable-net
    ports:
      - "6379:6379"

  redis-replica-1:
    image: bitnamilegacy/redis:8.2.1-debian-12-r0
    container_name: redis-replica-1
    restart: unless-stopped
    depends_on:
      - redis-master
    environment:
      <<: *redis-common-env
      REDIS_REPLICATION_MODE: slave
      REDIS_MASTER_HOST: redis-master
      REDIS_MASTER_PORT_NUMBER: 6379
      REDIS_MASTER_PASSWORD: "${REDIS_PASSWORD:-change_me_to_a_strong_password}"
    volumes:
      - redis-replica-1-data:/bitnami/redis/data
    networks:
      - supertable-net

  # Sentinel nodes require the specialized Sentinel image
  redis-sentinel-1:
    image: bitnamilegacy/redis-sentinel:8.2.1-debian-12-r0
    container_name: redis-sentinel-1
    restart: unless-stopped
    profiles:
      - sentinel
    depends_on:
      - redis-master
      - redis-replica-1
    environment:
      <<: *sentinel-common-env
    networks:
      - supertable-net
    ports:
      - "26379:26379"

  redis-sentinel-2:
    image: bitnamilegacy/redis-sentinel:8.2.1-debian-12-r0
    container_name: redis-sentinel-2
    restart: unless-stopped
    profiles:
      - sentinel
    depends_on:
      - redis-master
      - redis-replica-1
    environment:
      <<: *sentinel-common-env
    networks:
      - supertable-net
    ports:
      - "26380:26379"  # Host port 26380 -> Container 26379

  redis-sentinel-3:
    image: bitnamilegacy/redis-sentinel:8.2.1-debian-12-r0
    container_name: redis-sentinel-3
    restart: unless-stopped
    profiles:
      - sentinel
    depends_on:
      - redis-master
      - redis-replica-1
    environment:
      <<: *sentinel-common-env
    networks:
      - supertable-net
    ports:
      - "26381:26379"  # Host port 26381 -> Container 26379

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    restart: unless-stopped
    profiles:
      - insights
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
      - ./redisinsight_databases.json:/redis_databases.json:ro
    networks:
      - supertable-net

networks:
  supertable-net:
    name: supertable-net

volumes:
  redis-master-data:
  redis-replica-1-data:
  redisinsight-data:
