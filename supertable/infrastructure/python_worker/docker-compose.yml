# Build sandbox image first (one-time):
#   docker compose --profile build up --build code-runner-slim
#
# Start the server:
#   docker compose up -d
#
# Rebuild server after code changes:
#   docker compose up -d --build

services:
  # Sandbox image used by warm pool — build only, does not run as a service
  code-runner-slim:
    image: code-runner-slim
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - build

  # FastAPI WebSocket server that manages sandbox containers
  python-worker:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: python-worker
    restart: unless-stopped
    ports:
      - "${SUPERTABLE_NOTEBOOK_PORT:-8010}:8010"
    environment:
      SUPERTABLE_NOTEBOOK_PORT: "8010"
      SUPERTABLE_NOTEBOOK_STATEFUL_WS: "${SUPERTABLE_NOTEBOOK_STATEFUL_WS:-1}"
      SUPERTABLE_NOTEBOOK_SESSION_TTL_SECONDS: "${SUPERTABLE_NOTEBOOK_SESSION_TTL_SECONDS:-1800}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Access to Docker API for spawning sandbox containers
    networks:
      - supertable-net

networks:
  supertable-net:
    name: supertable-net
