<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Client Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface-2: #1c2129;
    --border: #30363d;
    --border-bright: #484f58;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb33;
    --green: #3fb950;
    --green-dim: #23883322;
    --red: #f85149;
    --red-dim: #f8514922;
    --orange: #d29922;
    --orange-dim: #d2992222;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header .badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .config-panel label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .input-row .field { flex: 1; }

  input[type="text"] {
    width: 100%;
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  .btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-secondary {
    background: var(--surface-2);
    color: var(--text);
  }
  .btn-secondary:hover { border-color: var(--border-bright); }

  .btn-danger {
    background: var(--red-dim);
    color: var(--red);
    border-color: var(--red);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.loading { background: var(--orange); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .panels {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 20px;
    min-height: 500px;
  }

  .tools-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    padding: 12px 16px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }

  .tool-list {
    padding: 8px;
    max-height: 500px;
    overflow-y: auto;
  }

  .tool-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 2px;
  }
  .tool-item:hover { background: var(--surface-2); }
  .tool-item.selected { background: var(--accent-dim); border: 1px solid var(--accent); }

  .tool-item .tool-name {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
  }

  .tool-item .tool-desc {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .main-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .call-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
  }

  .call-panel h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .call-panel h3 code {
    font-family: var(--mono);
    color: var(--accent);
  }

  .args-editor {
    width: 100%;
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    outline: none;
    resize: vertical;
    min-height: 120px;
    line-height: 1.5;
    tab-size: 2;
  }

  .args-editor:focus { border-color: var(--accent); }

  .call-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .log-entries {
    padding: 12px;
    overflow-y: auto;
    flex: 1;
    max-height: 400px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
  }

  .log-entry {
    padding: 8px 10px;
    border-radius: 4px;
    margin-bottom: 6px;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .log-entry.request { background: var(--accent-dim); border-left: 3px solid var(--accent); }
  .log-entry.response { background: var(--green-dim); border-left: 3px solid var(--green); }
  .log-entry.error { background: var(--red-dim); border-left: 3px solid var(--red); }
  .log-entry.info { background: var(--surface-2); border-left: 3px solid var(--text-muted); }

  .log-entry .log-label {
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: block;
  }
  .log-entry.request .log-label { color: var(--accent); }
  .log-entry.response .log-label { color: var(--green); }
  .log-entry.error .log-label { color: var(--red); }
  .log-entry.info .log-label { color: var(--text-muted); }

  .empty-state {
    padding: 40px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  .schema-hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
    font-family: var(--mono);
    background: var(--surface-2);
    padding: 8px 10px;
    border-radius: 4px;
    max-height: 100px;
    overflow-y: auto;
  }
</style>
</head>
<body>

<div class="header">
  <h1>MCP Client Simulator</h1>
  <span class="badge">Streamable HTTP</span>
</div>

<div class="config-panel">
  <div class="input-row">
    <div class="field">
      <label>MCP Server URL</label>
      <input type="text" id="serverUrl" value="https://192.168.168.130:8470/mcp" placeholder="https://host:port/mcp">
    </div>
    <button class="btn btn-primary" id="btnConnect" onclick="doConnect()">Connect</button>
    <button class="btn btn-danger" id="btnDisconnect" onclick="doDisconnect()" style="display:none">Disconnect</button>
  </div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not connected</span>
  </div>
</div>

<div class="panels">
  <div class="tools-panel">
    <div class="panel-header">Tools <span id="toolCount"></span></div>
    <div class="tool-list" id="toolList">
      <div class="empty-state">Connect to discover tools</div>
    </div>
  </div>

  <div class="main-panel">
    <div class="call-panel" id="callPanel" style="display:none">
      <h3>Call tool: <code id="callToolName"></code></h3>
      <label style="font-size:12px;color:var(--text-muted);margin-bottom:6px;display:block">Arguments (JSON)</label>
      <textarea class="args-editor" id="argsEditor">{}</textarea>
      <div class="schema-hint" id="schemaHint"></div>
      <div class="call-actions">
        <button class="btn btn-primary" onclick="doCallTool()">Execute</button>
      </div>
    </div>

    <div class="log-panel">
      <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center">
        Protocol Log
        <button class="btn btn-secondary" style="padding:4px 10px;font-size:11px" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-entries" id="logEntries">
        <div class="empty-state">Protocol messages will appear here</div>
      </div>
    </div>
  </div>
</div>

<script>
let sessionId = null;
let tools = [];
let selectedTool = null;
let msgId = 0;

const $ = id => document.getElementById(id);

function nextId() { return ++msgId; }

function setStatus(state, text) {
  $('statusDot').className = 'status-dot ' + state;
  $('statusText').textContent = text;
}

function log(type, label, data) {
  const el = $('logEntries');
  if (el.querySelector('.empty-state')) el.innerHTML = '';
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  const formatted = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
  entry.innerHTML = `<span class="log-label">${label}</span>${escapeHtml(formatted)}`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearLog() {
  $('logEntries').innerHTML = '<div class="empty-state">Protocol messages will appear here</div>';
}

async function mcpPost(url, body) {
  const headers = {
    'Content-Type': 'application/json',
    'Accept': 'application/json, text/event-stream',
  };
  if (sessionId) headers['Mcp-Session-Id'] = sessionId;

  log('request', `POST ${body.method || 'notification'}`, body);

  const resp = await fetch(url, {
    method: 'POST',
    headers,
    body: JSON.stringify(body),
  });

  // Capture session id from response
  const sid = resp.headers.get('Mcp-Session-Id');
  if (sid) sessionId = sid;

  const contentType = resp.headers.get('content-type') || '';

  if (contentType.includes('text/event-stream')) {
    // Parse SSE stream
    const text = await resp.text();
    const events = [];
    for (const chunk of text.split('\n\n')) {
      const dataLine = chunk.split('\n').find(l => l.startsWith('data: '));
      if (dataLine) {
        try {
          events.push(JSON.parse(dataLine.slice(6)));
        } catch {}
      }
    }
    if (events.length === 1) return events[0];
    return events.length ? events : { _raw: text };
  }

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`HTTP ${resp.status}: ${errText}`);
  }

  // Notifications return 202 with empty body
  const text = await resp.text();
  if (!text || !text.trim()) {
    return { _status: resp.status, _empty: true };
  }

  try {
    return JSON.parse(text);
  } catch {
    return { _raw: text };
  }
}

async function doConnect() {
  const url = $('serverUrl').value.trim();
  if (!url) return;

  sessionId = null;
  tools = [];
  selectedTool = null;
  $('callPanel').style.display = 'none';

  setStatus('loading', 'Connecting...');
  $('btnConnect').disabled = true;

  try {
    // Step 1: Initialize
    log('info', 'STEP 1', 'Sending initialize request...');
    const initResult = await mcpPost(url, {
      jsonrpc: '2.0',
      id: nextId(),
      method: 'initialize',
      params: {
        protocolVersion: '2025-03-26',
        capabilities: { tools: {} },
        clientInfo: { name: 'mcp-simulator', version: '1.0.0' },
      },
    });
    log('response', 'Initialize result', initResult);

    // Step 2: Send initialized notification
    log('info', 'STEP 2', 'Sending initialized notification...');
    await mcpPost(url, {
      jsonrpc: '2.0',
      method: 'notifications/initialized',
    });
    log('info', 'Notification sent', 'notifications/initialized');

    // Step 3: List tools
    log('info', 'STEP 3', 'Listing tools...');
    const toolsResult = await mcpPost(url, {
      jsonrpc: '2.0',
      id: nextId(),
      method: 'tools/list',
      params: {},
    });
    log('response', 'Tools list', toolsResult);

    // Extract tools from response
    const result = toolsResult.result || toolsResult;
    tools = result.tools || [];

    renderTools();
    setStatus('connected', `Connected — ${tools.length} tools available`);
    $('btnConnect').style.display = 'none';
    $('btnDisconnect').style.display = '';

  } catch (err) {
    log('error', 'Connection failed', err.message);
    setStatus('error', 'Connection failed: ' + err.message);
  } finally {
    $('btnConnect').disabled = false;
  }
}

function doDisconnect() {
  sessionId = null;
  tools = [];
  selectedTool = null;
  setStatus('', 'Not connected');
  $('toolList').innerHTML = '<div class="empty-state">Connect to discover tools</div>';
  $('toolCount').textContent = '';
  $('callPanel').style.display = 'none';
  $('btnConnect').style.display = '';
  $('btnDisconnect').style.display = 'none';
  log('info', 'Disconnected', 'Session cleared');
}

function renderTools() {
  $('toolCount').textContent = `(${tools.length})`;
  if (!tools.length) {
    $('toolList').innerHTML = '<div class="empty-state">No tools exposed</div>';
    return;
  }
  $('toolList').innerHTML = tools.map((t, i) => `
    <div class="tool-item" onclick="selectTool(${i})" id="tool-${i}">
      <div class="tool-name">${escapeHtml(t.name)}</div>
      <div class="tool-desc">${escapeHtml(t.description || 'No description')}</div>
    </div>
  `).join('');
}

function selectTool(idx) {
  selectedTool = tools[idx];
  document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('selected'));
  $('tool-' + idx).classList.add('selected');

  $('callPanel').style.display = '';
  $('callToolName').textContent = selectedTool.name;

  // Build default args from input schema
  const schema = selectedTool.inputSchema || {};
  const props = schema.properties || {};
  const defaults = {};
  for (const [key, val] of Object.entries(props)) {
    if (val.type === 'string') defaults[key] = '';
    else if (val.type === 'number' || val.type === 'integer') defaults[key] = 0;
    else if (val.type === 'boolean') defaults[key] = false;
    else defaults[key] = null;
  }
  $('argsEditor').value = JSON.stringify(defaults, null, 2);

  // Show schema hint
  const required = schema.required || [];
  const hints = Object.entries(props).map(([k, v]) => {
    const req = required.includes(k) ? ' *required' : '';
    const desc = v.description ? ` — ${v.description}` : '';
    return `${k}: ${v.type || '?'}${req}${desc}`;
  });
  $('schemaHint').textContent = hints.join('\n') || 'No parameters';
}

async function doCallTool() {
  if (!selectedTool) return;
  const url = $('serverUrl').value.trim();

  let args;
  try {
    args = JSON.parse($('argsEditor').value);
  } catch (e) {
    log('error', 'Invalid JSON', e.message);
    return;
  }

  try {
    const result = await mcpPost(url, {
      jsonrpc: '2.0',
      id: nextId(),
      method: 'tools/call',
      params: {
        name: selectedTool.name,
        arguments: args,
      },
    });
    log('response', `Result: ${selectedTool.name}`, result);
  } catch (err) {
    log('error', `Call failed: ${selectedTool.name}`, err.message);
  }
}
</script>
</body>
</html>
