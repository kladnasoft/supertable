<div class="super-container" style="
    background-color: #f3f6fb;
    font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding: 0px;
">
    <div style="
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        padding: 14px 20px;
        border: 1px solid #e0e5f0;
        display: flex;
        align-items: stretch;
        gap: 0;
        overflow: hidden;
    ">

        <!-- LEFT: SuperTable selector -->
        <div style="
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 20px;
            border-right: 1px solid #e0e5f0;
            flex-shrink: 0;
        ">
            <button type="button" id="btnDeleteSuperInline" title="Delete selected SuperTable"
                style="width:34px; height:34px; border-radius:8px; border:1px solid rgba(239,68,68,.25); background:transparent; color:#475569; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1; transition: all 0.15s ease; flex-shrink:0;"
                onmouseover="this.style.borderColor='#ef4444'; this.style.color='#ef4444'; this.style.background='rgba(239,68,68,0.06)'"
                onmouseout="this.style.borderColor='rgba(239,68,68,.25)'; this.style.color='#475569'; this.style.background='transparent'">−</button>

            <div style="display:flex; flex-direction:column; gap:3px; width:180px;">
                <span style="font-size:10px; font-weight:700; color:#8d99ae; text-transform:uppercase; letter-spacing:0.06em;"></span>
                <select id="pairSel" onchange="__st_onPairChange()" style="
                    width: 100%;
                    padding: 6px 28px 6px 8px;
                    border: 1px solid #e0e5f0;
                    border-radius: 6px;
                    font-size: 12px;
                    font-weight: 600;
                    color: #0f172a;
                    background-color: #ffffff;
                    cursor: pointer;
                    appearance: none;
                    background-image: url('data:image/svg+xml,%3Csvg width=%2712%27 height=%278%27 viewBox=%270 0 12 8%27 fill=%27none%27 xmlns=%27http://www.w3.org/2000/svg%27%3E%3Cpath d=%27M1 1.5L6 6.5L11 1.5%27 stroke=%27%238d99ae%27 stroke-width=%271.5%27 stroke-linecap=%27round%27/%3E%3C/svg%3E');
                    background-repeat: no-repeat;
                    background-position: right 10px center;
                ">
                </select>
            </div>

            <button type="button" id="btnCreateSuperInline" title="Create SuperTable"
                style="width:34px; height:34px; border-radius:8px; border:1px solid #b1dbec; background:transparent; color:#1c96ca; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; line-height:1; transition: all 0.15s ease; flex-shrink:0;"
                onmouseover="this.style.background='rgba(28,150,202,0.08)'"
                onmouseout="this.style.background='transparent'">+</button>

            <button type="button" id="btnRefreshSupers" title="Refresh"
                style="width:34px; height:34px; border-radius:8px; border:1px solid #e0e5f0; background:transparent; color:#8d99ae; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition: all 0.15s ease; flex-shrink:0;"
                onmouseover="this.style.borderColor='#1c96ca'; this.style.color='#1c96ca'"
                onmouseout="this.style.borderColor='#e0e5f0'; this.style.color='#8d99ae'">
                <i class="fas fa-arrows-rotate"></i>
            </button>
        </div>

        <!-- RIGHT: Metric cards -->
        <div style="
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-left: 20px;
            align-items: center;
        ">
            <!-- FILES -->
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="
                    background:#e6f4fa; width:34px; height:34px; border-radius:8px;
                    display:flex; align-items:center; justify-content:center; color:#1c96ca; font-size:14px;
                "><i class="fa-solid fa-file"></i></div>
                <div>
                    <div style="font-size:10px; font-weight:600; color:#8d99ae; text-transform:uppercase; letter-spacing:0.04em;">Files</div>
                    <div id="tenantFilesValue" style="font-size:17px; font-weight:800; color:#0f172a;">n/a</div>
                </div>
            </div>

            <!-- ROWS -->
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="
                    background:#e6f4fa; width:34px; height:34px; border-radius:8px;
                    display:flex; align-items:center; justify-content:center; color:#1c96ca; font-size:14px;
                "><i class="fas fa-bars"></i></div>
                <div>
                    <div style="font-size:10px; font-weight:600; color:#8d99ae; text-transform:uppercase; letter-spacing:0.04em;">Rows</div>
                    <div id="tenantRowsValue" style="font-size:17px; font-weight:800; color:#0f172a;">n/a</div>
                </div>
            </div>

            <!-- VERSION -->
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="
                    background:#e6f4fa; width:34px; height:34px; border-radius:8px;
                    display:flex; align-items:center; justify-content:center; color:#1c96ca; font-size:14px;
                "><i class="fas fa-code-branch"></i></div>
                <div>
                    <div style="font-size:10px; font-weight:600; color:#8d99ae; text-transform:uppercase; letter-spacing:0.04em;">Version</div>
                    <div id="tenantVersionValue" style="font-size:17px; font-weight:800; color:#0f172a;">n/a</div>
                </div>
            </div>

            <!-- BYTE SIZE -->
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="
                    background:#e6f4fa; width:34px; height:34px; border-radius:8px;
                    display:flex; align-items:center; justify-content:center; color:#1c96ca; font-size:14px;
                "><i class="fa-solid fa-database"></i></div>
                <div>
                    <div style="font-size:10px; font-weight:600; color:#8d99ae; text-transform:uppercase; letter-spacing:0.04em;">Size</div>
                    <div id="tenantSizeValue" style="font-size:17px; font-weight:800; color:#0f172a;">n/a</div>
                </div>
            </div>
        </div>

        <!-- Updated timestamp -->
        <div style="
            padding-left: 16px;
            border-left: 1px solid #e0e5f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            min-width: 110px;
        ">
            <span style="font-size:10px; font-weight:600; color:#8d99ae; text-transform:uppercase; letter-spacing:0.04em;">Updated</span>
            <span id="tenantUpdatedValue" style="font-size:12px; font-weight:600; color:#0f172a;">n/a</span>
        </div>
    </div>
</div>

<!-- Create/Delete SuperTable Modal -->
<div id="superModal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,.55); z-index:9999; align-items:center; justify-content:center; padding:16px;">
  <div style="width: min(560px, 100%); background:#fff; border-radius:12px; border:1px solid rgba(15,23,42,.12); box-shadow: 0 20px 60px rgba(15,23,42,.4); overflow:hidden;">
    <div style="display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:linear-gradient(180deg, rgba(28,150,202,.10), rgba(28,150,202,.03));">
      <div style="font-weight:800; color:#0f172a;" id="superModalTitle">Action</div>
      <button type="button" id="superModalClose" style="border:0; background:transparent; font-size:18px; cursor:pointer; color:#334155;">✕</button>
    </div>
    <div style="padding:16px;">
      <div style="font-size:13px; color:#64748b; margin-bottom:10px;" id="superModalHint"></div>
      <label style="display:block; font-size:12px; font-weight:700; color:#334155; margin-bottom:8px;" for="superNameInput">SuperTable name</label>
      <input id="superNameInput" type="text" placeholder="e.g. example" style="width:100%; padding:12px 12px; border-radius:12px; border:1px solid rgba(15,23,42,.15); outline:none; font-size:14px;">
      <div style="display:flex; gap:10px; margin-top:14px;">
        <button type="button" id="superModalPrimary" style="flex:1; padding:12px 12px; border-radius:12px; border:0; background:#1c96ca; color:#fff; font-weight:800; cursor:pointer;">Confirm</button>
        <button type="button" id="superModalCancel" style="flex:1; padding:12px 12px; border-radius:12px; border:1px solid rgba(15,23,42,.15); background:#fff; color:#0f172a; font-weight:800; cursor:pointer;">Cancel</button>
      </div>
      <div style="margin-top:12px; font-size:12px; color:#ef4444; display:none;" id="superModalError"></div>
      <div style="margin-top:10px; font-size:12px; color:#10b981; display:none;" id="superModalOk"></div>
    </div>
  </div>
</div>

<script>
(function () {
    window.__st_selection_component = true;

    // Read globals set by sidebar.html
    const ORG_NAME = window.__st_org || {{ session_org|default(sel_org|default("", true), true)|tojson }};
    const IS_SUPERUSER = window.__st_is_superuser || {{ session_is_superuser|default(false, true)|tojson }};
    const PRESELECT_SUP = {{ sel_sup|default("", true)|tojson }};

    const pairSel = document.getElementById("pairSel");
    let lastSupers = [];
    const btnCreateInline = document.getElementById("btnCreateSuperInline");
    const btnDeleteInline = document.getElementById("btnDeleteSuperInline");
    const btnRefresh = document.getElementById("btnRefreshSupers");

    // --- SessionStorage cache ---
    const _SUPERS_CACHE_KEY = "st_supers:" + ORG_NAME;
    const _ROLES_CACHE_PREFIX = "st_user_roles:" + ORG_NAME + ":";

    function _getCached(key) {
        try {
            var raw = sessionStorage.getItem(key);
            if (!raw) return null;
            var parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) return parsed;
        } catch (e) {}
        return null;
    }

    function _setCache(key, list) {
        try { sessionStorage.setItem(key, JSON.stringify(list)); } catch (e) {}
    }

    function _clearAllCaches() {
        try {
            sessionStorage.removeItem(_SUPERS_CACHE_KEY);
            var keys = [];
            for (var i = 0; i < sessionStorage.length; i++) {
                var k = sessionStorage.key(i);
                if (k && (k.indexOf(_ROLES_CACHE_PREFIX) === 0 || k.indexOf("st_exec_sessions:") === 0)) keys.push(k);
            }
            for (var j = 0; j < keys.length; j++) sessionStorage.removeItem(keys[j]);
        } catch (e) {}
    }

    // Expose for sidebar.html logout handler
    window.__st_clearAllCaches = _clearAllCaches;
    const filesEl = document.getElementById("tenantFilesValue");
    const rowsEl = document.getElementById("tenantRowsValue");
    const sizeEl = document.getElementById("tenantSizeValue");
    const versionEl = document.getElementById("tenantVersionValue");
    const updatedEl = document.getElementById("tenantUpdatedValue");

    function formatBytes(bytes) {
        if (bytes === null || bytes === undefined || isNaN(bytes)) return "n/a";
        let val = Number(bytes);
        const units = ["B", "KB", "MB", "GB", "TB", "PB"];
        let i = 0;
        while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
        return val.toFixed(1) + " " + units[i];
    }

    function formatDate(ms) {
        if (!ms && ms !== 0) return "n/a";
        const d = new Date(ms);
        if (isNaN(d.getTime())) return "n/a";
        return d.toLocaleString();
    }

    function clearEmbeddedTablesIfPresent() {
        const tbody = document.getElementById('tablesBody');
        if (tbody) tbody.innerHTML = '';
        const totalEl = document.getElementById('tablesTotalCount');
        const shownEl = document.getElementById('tablesShownCount');
        if (totalEl) totalEl.textContent = '0';
        if (shownEl) shownEl.textContent = '0';
    }

    function applySuperMeta(superMeta) {
        if (!superMeta) {
            if (filesEl) filesEl.textContent = "n/a";
            if (rowsEl) rowsEl.textContent = "n/a";
            if (sizeEl) sizeEl.textContent = "n/a";
            if (versionEl) versionEl.textContent = "n/a";
            if (updatedEl) updatedEl.textContent = "n/a";
            clearEmbeddedTablesIfPresent();
            return;
        }
        if (filesEl) filesEl.textContent = superMeta.files != null ? superMeta.files : "0";
        if (rowsEl) rowsEl.textContent = superMeta.rows != null ? superMeta.rows : "0";
        if (sizeEl) sizeEl.textContent = superMeta.size != null ? formatBytes(superMeta.size) : "n/a";
        if (versionEl) versionEl.textContent = superMeta.version != null ? superMeta.version : "n/a";
        if (updatedEl) updatedEl.textContent = formatDate(superMeta.updated_utc);
    }

    async function loadSupers(forceRefresh) {
        try {
            var supers;

            if (!forceRefresh) {
                supers = _getCached(_SUPERS_CACHE_KEY);
            }

            if (supers === null || supers === undefined) {
                console.log("[selection] fetching /api/v1/supertables from server");
                const resp = await fetch("/api/v1/supertables?organization=" + encodeURIComponent(ORG_NAME));
                if (!resp.ok) throw new Error("Failed to load supers: " + resp.status);
                const data = await resp.json();
                supers = (data && data.supers) || [];
                _setCache(_SUPERS_CACHE_KEY, supers);
            } else {
                console.log("[selection] using cached supers list (" + supers.length + " items)");
            }

            lastSupers = supers;

            pairSel.innerHTML = "";

            if (!supers.length) {
                const opt = document.createElement("option");
                opt.value = "";
                opt.textContent = "No SuperTables found";
                pairSel.appendChild(opt);
                applySuperMeta(null);
                return;
            }

            supers.forEach(function (name) {
                const opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                pairSel.appendChild(opt);
            });

            let initialSup = "";
            try {
                const params0 = new URLSearchParams(window.location.search || "");
                initialSup = (params0.get("sup") || "").trim();
            } catch (e) {}
            if (!initialSup) initialSup = (PRESELECT_SUP || "").trim();

            if (initialSup) {
                const found = Array.from(pairSel.options || []).some(o => o && o.value === initialSup);
                if (found) pairSel.value = initialSup;
            }

            if (pairSel.value) {
                await loadSuperMeta(pairSel.value);
            } else {
                applySuperMeta(null);
            }
        } catch (err) {
            console.error("Error loading supers:", err);
            applySuperMeta(null);
        }
    }

    async function loadSuperMeta(superName) {
        clearEmbeddedTablesIfPresent();
        if (!superName) { applySuperMeta(null); return; }

        try {
            var roleName = (window.__st_active_role || window.__st_role_name || "").trim();

            const params = new URLSearchParams({
                organization: ORG_NAME,
                super_name: superName
            });
            if (roleName) {
                params.set("role_name", roleName);
            }

            const resp = await fetch("/api/v1/supertables/meta?" + params.toString());
            if (!resp.ok) throw new Error("Failed to load super meta: " + resp.status);
            const data = await resp.json();
            const superMeta = data && data.meta && data.meta.super;
            applySuperMeta(superMeta || null);

            // Load user role names (cached in sessionStorage)
            await loadUserRoles(ORG_NAME, superName);

            try {
                if (typeof window.onSuperMetaLoaded === "function") {
                    window.onSuperMetaLoaded(ORG_NAME, superName, superMeta || null);
                }
            } catch (e) { console.error("onSuperMetaLoaded failed:", e); }
        } catch (err) {
            console.error("Error loading super meta:", err);
            applySuperMeta(null);
        }
    }

    async function loadUserRoles(orgName, superName, forceRefresh) {
        var cacheKey = _ROLES_CACHE_PREFIX + superName;
        var roleNames;

        if (!forceRefresh) {
            roleNames = _getCached(cacheKey);
        }

        if (roleNames === null || roleNames === undefined) {
            console.log("[selection] fetching /api/v1/session/role-names from server");
            try {
                var resp = await fetch(
                    "/api/v1/session/role-names?org=" + encodeURIComponent(orgName) +
                    "&sup=" + encodeURIComponent(superName)
                );
                if (!resp.ok) throw new Error("User roles fetch failed: " + resp.status);
                var data = await resp.json();
                roleNames = data.role_names || [];
                _setCache(cacheKey, roleNames);
            } catch (err) {
                console.error("Failed to load user roles:", err);
                roleNames = [];
            }
        } else {
            console.log("[selection] using cached role names (" + roleNames.length + " items)");
        }

        // Notify sidebar to apply these role names
        if (typeof window.__st_applyRoleNames === "function") {
            window.__st_applyRoleNames(roleNames);
        }
    }

    // Primary handler for the SuperTable selector.
    window.__st_onPairChange = function __st_onPairChange() {
        const superName = pairSel.value;
        loadSuperMeta(superName);

        let nextHref = "";
        try {
            const params = new URLSearchParams(window.location.search || "");
            params.set("sup", superName || "");
            nextHref = window.location.pathname + "?" + params.toString();
            history.replaceState(null, "", nextHref);
        } catch (e) {}

        let allowFallbackReload = true;
        try {
            const ev = new CustomEvent("supertable-changed", {
                cancelable: true,
                detail: { org: ORG_NAME, sup: superName, super_name: superName }
            });
            allowFallbackReload = window.dispatchEvent(ev);
        } catch (e) {}

        try {
            if (typeof window.onPairChange === "function" && window.onPairChange !== window.__st_onPairChange) {
                window.onPairChange(ORG_NAME, superName);
                return;
            }
        } catch (e) { console.error("Page onPairChange failed:", e); }

        if (allowFallbackReload) {
            if (nextHref) { window.location.href = nextHref; }
            else { window.location.reload(); }
        }
    };

    if (typeof window.onPairChange !== "function") {
        window.onPairChange = window.__st_onPairChange;
    }

    // Refresh button
    if (btnRefresh) {
        btnRefresh.addEventListener("click", function () {
            var icon = btnRefresh.querySelector("i");
            if (icon) { icon.style.transition = "transform 0.5s ease"; icon.style.transform = "rotate(360deg)"; }
            _clearAllCaches();
            loadSupers(true).then(function () {
                setTimeout(function () { if (icon) icon.style.transform = ""; }, 600);
            });
        });
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", loadSupers);
    } else {
        loadSupers();
    }

    function showModal(mode, supersList, selectedName) {
        const modal = document.getElementById("superModal");
        const title = document.getElementById("superModalTitle");
        const hint = document.getElementById("superModalHint");
        const input = document.getElementById("superNameInput");
        const btnPrimary = document.getElementById("superModalPrimary");
        const btnClose = document.getElementById("superModalClose");
        const btnCancel = document.getElementById("superModalCancel");
        const err = document.getElementById("superModalError");
        const ok = document.getElementById("superModalOk");

        err.style.display = "none";
        ok.style.display = "none";
        input.value = "";
        if (mode === "delete" && (selectedName || "").trim()) {
            input.value = String(selectedName).trim();
            input.select();
        }
        input.setAttribute("list", "");
        input.removeAttribute("list");

        if (mode === "create") {
            title.textContent = "Create SuperTable";
            hint.textContent = "Enter a new SuperTable name and press Create.";
            btnPrimary.textContent = "Create";
        } else {
            title.textContent = "Delete SuperTable";
            const sel = (selectedName || "").trim();
            hint.textContent = sel
              ? ("Only the selected SuperTable can be deleted. Type \"" + sel + "\" to confirm, then press Delete.")
              : "Select a SuperTable first, then click − to delete. You must type its name to confirm.";
            btnPrimary.textContent = "Delete";
        }

        let dl = document.getElementById("superNameDatalist");
        if (!dl) { dl = document.createElement("datalist"); dl.id = "superNameDatalist"; document.body.appendChild(dl); }
        dl.innerHTML = "";
        (supersList || []).forEach(s => { const opt = document.createElement("option"); opt.value = s; dl.appendChild(opt); });
        if (mode === "delete") { input.removeAttribute("list"); }

        function close() {
            modal.style.display = "none";
            modal.style.alignItems = "";
            modal.style.justifyContent = "";
        }

        btnClose.onclick = close;
        btnCancel.onclick = close;
        modal.onclick = (e) => { if (e.target === modal) close(); };

        btnPrimary.onclick = async () => {
            err.style.display = "none";
            ok.style.display = "none";
            const name = (input.value || "").trim();
            if (!name) { err.textContent = "SuperTable name is required."; err.style.display = ""; return; }

            try {
                if (mode === "create") {
                    const url = `/api/v1/supertables/meta?organization=${encodeURIComponent(ORG_NAME)}&super_name=${encodeURIComponent(name)}`;
                    const res = await fetch(url, { method: "POST" });
                    const js = await res.json();
                    if (!js || !js.ok) throw new Error((js && js.detail) || "Create failed");
                    ok.textContent = `Created: ${js.name || name}`;
                    ok.style.display = "";
                } else {
                    const selected = (selectedName || "").trim();
                    if (!selected) { err.textContent = "Select a SuperTable first."; err.style.display = ""; return; }
                    if (name !== selected) { err.textContent = "Type the selected SuperTable name exactly to confirm deletion."; err.style.display = ""; return; }
                    const url = `/api/v1/supertables/meta?organization=${encodeURIComponent(ORG_NAME)}&super_name=${encodeURIComponent(selected)}&user_hash=${encodeURIComponent(window.__st_user_hash || "")}`;
                    const res = await fetch(url, { method: "DELETE" });
                    const js = await res.json();
                    if (!js || !js.ok) throw new Error((js && js.detail) || "Delete failed");
                    ok.textContent = `Deleted: ${js.name || name}`;
                    ok.style.display = "";
                }
                await loadSupers(true);
                close();
            } catch (e) {
                err.textContent = e && e.message ? e.message : "Operation failed.";
                err.style.display = "";
            }
        };

        modal.style.display = "flex";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";
        setTimeout(() => input.focus(), 50);
    }

    function setInlineSuperButtonsVisibility() {
      const show = !!IS_SUPERUSER;
      if (btnCreateInline) btnCreateInline.style.display = show ? "flex" : "none";
      if (btnDeleteInline) btnDeleteInline.style.display = show ? "flex" : "none";
    }
    setInlineSuperButtonsVisibility();

    if (btnCreateInline) {
      btnCreateInline.addEventListener("click", () => {
        showModal("create", Array.isArray(lastSupers) ? lastSupers : [], pairSel ? pairSel.value : "");
      });
    }

    if (btnDeleteInline) {
      btnDeleteInline.addEventListener("click", () => {
        showModal("delete", Array.isArray(lastSupers) ? lastSupers : [], pairSel ? pairSel.value : "");
      });
    }

})();
</script>
