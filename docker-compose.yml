# =====================================================================
# Supertable Services
# =====================================================================
#
# Prerequisites:
#   Infrastructure must be running before starting any Supertable service:
#     - Redis:  infrastructure/redis/    (docker compose up -d)
#     - MinIO:  infrastructure/minio/    (docker compose up -d)
#
#   All services communicate via the shared "supertable-net" Docker network,
#   which is auto-created by whichever compose file starts first.
#
# Profiles:
#   reflection  — Admin UI + REST API           :8050
#   api         — REST API                       :8090
#   mcp         — MCP stdio + http + web app (/mcp, /web, /simulation) :8070, :8099
#   mcp-http    — Legacy dedicated MCP HTTP profile             :8070
#   notebook    — Notebook WebSocket server       :8000
#   spark       — Spark plug WebSocket server     :8010
#   https       — Caddy TLS sidecar (combinable)
#
# Examples:
#   docker compose --profile reflection up -d
#   docker compose --profile api --profile mcp up -d
#   docker compose --profile reflection --profile https up -d
# =====================================================================

x-common-env: &common-env
  DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}
  SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-storage-env: &storage-env
  STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://minio:9000}
  STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
  STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

services:

  # =====================================================================
  # reflection — Supertable admin UI + reflection REST API
  # Start with:  docker compose --profile reflection up -d
  # URL:         http://localhost:8050
  # =====================================================================

  supertable-reflection:
    build: .
    profiles: ["reflection"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: reflection
      SUPERTABLE_HOST: 0.0.0.0
      SUPERTABLE_REFLECTION_PORT: ${SUPERTABLE_REFLECTION_PORT:-8050}
      SUPERTABLE_ADMIN_TOKEN: ${SUPERTABLE_ADMIN_TOKEN:?Set SUPERTABLE_ADMIN_TOKEN in .env}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-0}
    networks:
      - supertable-net
    ports:
      - "${SUPERTABLE_REFLECTION_PORT:-8050}:${SUPERTABLE_REFLECTION_PORT:-8050}"

  # =====================================================================
  # api — Supertable REST API
  # Start with:  docker compose --profile api up -d
  # URL:         http://localhost:8090
  # =====================================================================

  supertable-api:
    build: .
    profiles: ["api"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: api
      SUPERTABLE_HOST: 0.0.0.0
      SUPERTABLE_API_PORT: ${SUPERTABLE_API_PORT:-8090}
      SUPERTABLE_ADMIN_TOKEN: ${SUPERTABLE_ADMIN_TOKEN:?Set SUPERTABLE_ADMIN_TOKEN in .env}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-0}
    networks:
      - supertable-net
    ports:
      - "${SUPERTABLE_API_PORT:-8090}:${SUPERTABLE_API_PORT:-8090}"

  # =====================================================================
  # mcp — MCP stdio server + HTTP/web app
  # Start with:  docker compose --profile mcp up -d
  # Endpoints:   http://localhost:8099/mcp
  #              http://localhost:8099/web
  #              http://localhost:8099/simulation
  # stdio:       foreground process inside the container (not exposed over the network)
  # =====================================================================

  supertable-mcp:
    build: .
    profiles: ["mcp"]
    init: true
    restart: unless-stopped
    # stdin_open + tty required for MCP stdio transport (foreground process).
    stdin_open: true
    tty: true
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: mcp
      # stdio is the foreground transport; entrypoint also starts streamable-http on :8070
      SUPERTABLE_MCP_TRANSPORT: stdio
      SUPERTABLE_MCP_PORT: ${SUPERTABLE_MCP_PORT:-8070}
      SUPERTABLE_MCP_AUTH_TOKEN: ${SUPERTABLE_MCP_AUTH_TOKEN:-}
      SUPERTABLE_REQUIRE_TOKEN: ${SUPERTABLE_REQUIRE_TOKEN:-1}
      SUPERTABLE_REQUIRE_EXPLICIT_ROLE: ${SUPERTABLE_REQUIRE_EXPLICIT_ROLE:-1}
      SUPERTABLE_ALLOWED_ROLES: ${SUPERTABLE_ALLOWED_ROLES:-}
      SUPERTABLE_ROLE: ${SUPERTABLE_ROLE:-}
      FORWARDED_ALLOW_IPS: "*"
      UVICORN_PROXY_HEADERS: "1"
      SUPERTABLE_ALLOWED_HOSTS: "*"
    networks:
      - supertable-net
    ports:
      - "8099:8099"                                                      # MCP web tester UI
      - "${SUPERTABLE_MCP_PORT:-8070}:${SUPERTABLE_MCP_PORT:-8070}"      # MCP streamable-http

  # =====================================================================
  # mcp-http — Legacy dedicated MCP server over streamable-http (for remote HTTP clients)
  # Start with:  docker compose --profile mcp-http up -d
  # Endpoint:    https://localhost:8070/mcp  (TLS via caddy-mcp sidecar)
  # No tty/stdin required — plain HTTP.
  # =====================================================================

  supertable-mcp-http:
    build: .
    profiles: ["mcp-http"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: mcp-http
      SUPERTABLE_MCP_TRANSPORT: streamable-http
      SUPERTABLE_MCP_PORT: 8000
      SUPERTABLE_MCP_HTTP_PATH: ${SUPERTABLE_MCP_HTTP_PATH:-/mcp}
      SUPERTABLE_MCP_AUTH_TOKEN: ${SUPERTABLE_MCP_AUTH_TOKEN:-}
      SUPERTABLE_REQUIRE_TOKEN: ${SUPERTABLE_REQUIRE_TOKEN:-1}
      SUPERTABLE_REQUIRE_EXPLICIT_ROLE: ${SUPERTABLE_REQUIRE_EXPLICIT_ROLE:-1}
      SUPERTABLE_ALLOWED_ROLES: ${SUPERTABLE_ALLOWED_ROLES:-}
      FORWARDED_ALLOW_IPS: "*"
      UVICORN_PROXY_HEADERS: "1"
    networks:
      - supertable-net
    # Port 8000 is intentionally NOT exposed to the host — traffic comes via caddy-mcp only.

  # =====================================================================
  # caddy-mcp — TLS termination sidecar for supertable-mcp-http
  # Listens on https://localhost:8070/mcp and proxies to mcp-http:8000
  # Uses Caddy's built-in local CA (tls internal) — no domain needed.
  #
  # One-time setup: trust Caddy's local root CA:
  #   docker compose --profile mcp-http exec caddy-mcp caddy trust
  # =====================================================================

  caddy-mcp:
    image: caddy:2-alpine
    profiles: ["mcp-http"]
    restart: unless-stopped
    depends_on:
      - supertable-mcp-http
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - supertable-net
    ports:
      - "8070:8070"   # HTTPS MCP endpoint → https://localhost:8070/mcp

  # =====================================================================
  # notebook — Supertable notebook WebSocket server
  # Start with:  docker compose --profile notebook up -d
  # URL:         http://localhost:8000  (or SUPERTABLE_NOTEBOOK_PORT)
  # =====================================================================

  supertable-notebook:
    build: .
    profiles: ["notebook"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: notebook
      SUPERTABLE_NOTEBOOK_PORT: ${SUPERTABLE_NOTEBOOK_PORT:-8000}
    networks:
      - supertable-net
    ports:
      - "${SUPERTABLE_NOTEBOOK_PORT:-8000}:${SUPERTABLE_NOTEBOOK_PORT:-8000}"
    volumes:
      - ./notebooks:/app/notebooks

  # =====================================================================
  # spark — Spark plug WebSocket server
  # Start with:  docker compose --profile spark up -d
  # URL:         http://localhost:8010
  # =====================================================================

  supertable-spark:
    build: .
    profiles: ["spark"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: spark
    networks:
      - supertable-net
    ports:
      - "8010:8010"

  # =====================================================================
  # caddy-https — Universal TLS sidecar for all services
  # Combine with any other profile to add HTTPS on top:
  #
  #   docker compose --profile mcp --profile https up -d
  #   docker compose --profile reflection --profile https up -d
  #   docker compose --profile mcp --profile api --profile https up -d
  #
  # Ports (HTTPS → HTTP internal):
  #   8443  reflection
  #   8470  mcp + web + simulation (paths on the same HTTPS origin)
  #   8490  api
  #   9443  minio S3 API
  #
  # One-time CA trust:
  #   docker compose --profile https exec caddy-https caddy trust
  # =====================================================================

  caddy-https:
    image: caddy:2-alpine
    profiles: ["https"]
    restart: unless-stopped
    volumes:
      - ./Caddyfile.https:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy-https-data:/data
      - caddy-https-config:/config
    networks:
      - supertable-net
    ports:
      - "8443:8443"    # reflection  → https://host:8443
      - "8470:8470"    # mcp/web/simulation → https://host:8470/{mcp,web,simulation}
      - "8490:8490"    # api         → https://host:8490
      - "9443:9443"    # minio S3    → https://host:9443

networks:
  supertable-net:
    name: supertable-net

volumes:
  caddy-data:
  caddy-config:
  caddy-https-data:
  caddy-https-config:
