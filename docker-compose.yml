services:
  # =====================================================================
  # Optional infrastructure — start with: --profile infra
  # =====================================================================

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    profiles: ["infra"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin123!}
    ports:
      - "9002:9000"   # S3 API  → http://localhost:9002
      - "9003:9001"   # Console → http://localhost:9003
    volumes:
      - minio-data:/data

  # =====================================================================
  # reflection — Supertable admin UI + reflection REST API
  # Start with:  docker compose --profile reflection up
  # URL:         http://localhost:8050
  # =====================================================================

  supertable-reflection:
    build: .
    profiles: ["reflection"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE: reflection
      SUPERTABLE_HOST: 0.0.0.0
      SUPERTABLE_REFLECTION_PORT: ${SUPERTABLE_REFLECTION_PORT:-8050}

      DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}

      # Token is mandatory — set it in .env before starting.
      SUPERTABLE_ADMIN_TOKEN: ${SUPERTABLE_ADMIN_TOKEN:?Set SUPERTABLE_ADMIN_TOKEN in .env}

      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB:   ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPERTABLE_REDIS_URL: ${SUPERTABLE_REDIS_URL:-redis://host.docker.internal:6379/0}

      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

      SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SUPERTABLE_REFLECTION_PORT:-8050}:${SUPERTABLE_REFLECTION_PORT:-8050}"

  # =====================================================================
  # api — Supertable REST API
  # Start with:  docker compose --profile api up
  # URL:         http://localhost:8090
  # =====================================================================

  supertable-api:
    build: .
    profiles: ["api"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE: api
      SUPERTABLE_HOST: 0.0.0.0
      SUPERTABLE_API_PORT: ${SUPERTABLE_API_PORT:-8090}

      DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}

      SUPERTABLE_ADMIN_TOKEN: ${SUPERTABLE_ADMIN_TOKEN:?Set SUPERTABLE_ADMIN_TOKEN in .env}

      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB:   ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPERTABLE_REDIS_URL: ${SUPERTABLE_REDIS_URL:-redis://host.docker.internal:6379/0}

      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

      SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SUPERTABLE_API_PORT:-8090}:${SUPERTABLE_API_PORT:-8090}"

  # =====================================================================
  # mcp — MCP stdio server + web tester UI
  # Start with:  docker compose --profile mcp up
  # Web tester:  http://localhost:8099
  # stdio:       connected via Claude Desktop / MCP client on stdin/stdout
  # =====================================================================

  supertable-mcp:
    build: .
    profiles: ["mcp"]
    init: true
    restart: unless-stopped
    # stdin_open + tty required for MCP stdio transport (foreground process).
    stdin_open: true
    tty: true
    env_file: .env
    environment:
      SERVICE: mcp
      # stdio is the foreground transport; entrypoint also starts streamable-http on :8070
      SUPERTABLE_MCP_TRANSPORT: stdio
      SUPERTABLE_MCP_PORT: ${SUPERTABLE_MCP_PORT:-8070}

      DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}

      SUPERTABLE_MCP_AUTH_TOKEN: ${SUPERTABLE_MCP_AUTH_TOKEN:-}
      SUPERTABLE_REQUIRE_TOKEN: ${SUPERTABLE_REQUIRE_TOKEN:-1}
      SUPERTABLE_REQUIRE_EXPLICIT_USER_HASH: ${SUPERTABLE_REQUIRE_EXPLICIT_USER_HASH:-1}
      # Optional allowlist — leave empty to allow all valid user hashes.
      SUPERTABLE_ALLOWED_USER_HASHES: ${SUPERTABLE_ALLOWED_USER_HASHES:-}
      SUPERTABLE_TEST_USER_HASH: ${SUPERTABLE_TEST_USER_HASH:-}

      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB:   ${REDIS_DB:-1}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPERTABLE_REDIS_URL: ${SUPERTABLE_REDIS_URL:-redis://host.docker.internal:6379/1}

      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

      SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8099:8099"                           # MCP web tester UI
      - "${SUPERTABLE_MCP_PORT:-8070}:${SUPERTABLE_MCP_PORT:-8070}"  # MCP streamable-http (Claude Desktop)

  # =====================================================================
  # mcp-http — MCP server over streamable-http (for remote HTTP clients)
  # Start with:  docker compose --profile mcp-http up
  # Endpoint:    https://localhost:8070/mcp  (TLS via caddy-mcp sidecar)
  # No tty/stdin required — plain HTTP.
  # =====================================================================

  supertable-mcp-http:
    build: .
    profiles: ["mcp-http"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE: mcp-http
      # Forced to streamable-http by entrypoint; declared here for clarity.
      SUPERTABLE_MCP_TRANSPORT: streamable-http
      SUPERTABLE_MCP_PORT: 8000                              # Caddy proxies to this port internally
      SUPERTABLE_MCP_HTTP_PATH: ${SUPERTABLE_MCP_HTTP_PATH:-/mcp}

      DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}

      SUPERTABLE_MCP_AUTH_TOKEN: ${SUPERTABLE_MCP_AUTH_TOKEN:-}
      SUPERTABLE_REQUIRE_TOKEN: ${SUPERTABLE_REQUIRE_TOKEN:-1}
      SUPERTABLE_REQUIRE_EXPLICIT_USER_HASH: ${SUPERTABLE_REQUIRE_EXPLICIT_USER_HASH:-1}
      SUPERTABLE_ALLOWED_USER_HASHES: ${SUPERTABLE_ALLOWED_USER_HASHES:-}

      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB:   ${REDIS_DB:-1}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPERTABLE_REDIS_URL: ${SUPERTABLE_REDIS_URL:-redis://host.docker.internal:6379/1}

      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

      SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Trust all proxy headers from Caddy — allows any Host header through.
      FORWARDED_ALLOW_IPS: "*"
      UVICORN_PROXY_HEADERS: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Port 8000 is intentionally NOT exposed to the host — traffic comes via caddy-mcp only.

  # =====================================================================
  # caddy-mcp — TLS termination sidecar for supertable-mcp-http
  # Listens on https://localhost:8070/mcp and proxies to mcp-http:8000
  # Uses Caddy's built-in local CA (tls internal) — no domain needed.
  #
  # One-time setup: trust Caddy's local root CA so your browser / curl
  # accepts the cert without warnings:
  #   docker compose --profile mcp-http exec caddy-mcp caddy trust
  # =====================================================================

  caddy-mcp:
    image: caddy:2-alpine
    profiles: ["mcp-http"]
    restart: unless-stopped
    depends_on:
      - supertable-mcp-http
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "8070:8070"   # HTTPS MCP endpoint → https://localhost:8070/mcp

  # =====================================================================
  # notebook — Supertable notebook WebSocket server
  # Start with:  docker compose --profile notebook up
  # URL:         http://localhost:8000  (or SUPERTABLE_NOTEBOOK_PORT)
  # =====================================================================

  supertable-notebook:
    build: .
    profiles: ["notebook"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE: notebook
      SUPERTABLE_NOTEBOOK_PORT: ${SUPERTABLE_NOTEBOOK_PORT:-8000}

      DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}

      REDIS_HOST: ${REDIS_HOST:-host.docker.internal}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB:   ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SUPERTABLE_REDIS_URL: ${SUPERTABLE_REDIS_URL:-redis://host.docker.internal:6379/0}

      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

      SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SUPERTABLE_NOTEBOOK_PORT:-8000}:${SUPERTABLE_NOTEBOOK_PORT:-8000}"
    volumes:
      # Persist notebooks between container restarts.
      - ./notebooks:/app/notebooks

  # =====================================================================
  # spark — Spark plug WebSocket server
  # Start with:  docker compose --profile spark up
  # URL:         http://localhost:8010
  # =====================================================================

  supertable-spark:
    build: .
    profiles: ["spark"]
    init: true
    restart: unless-stopped
    env_file: .env
    environment:
      SERVICE: spark

      DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}

      STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://host.docker.internal:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

      SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8010:8010"   # Spark plug WebSocket server

  # =====================================================================
  # caddy-https — Universal TLS sidecar for all services
  # Combine with any other profile to add HTTPS on top:
  #
  #   docker compose --profile mcp --profile https up
  #   docker compose --profile reflection --profile https up
  #   docker compose --profile mcp --profile api --profile https up
  #
  # Ports (HTTPS → HTTP internal):
  #   8050  reflection
  #   8070  mcp streamable-http
  #   8090  api
  #   8099  mcp web tester
  #   9443  minio S3 API
  #
  # One-time CA trust:
  #   docker compose --profile https exec caddy-https caddy trust
  # =====================================================================

  caddy-https:
    image: caddy:2-alpine
    profiles: ["https"]
    restart: unless-stopped
    volumes:
      - ./Caddyfile.https:/etc/caddy/Caddyfile:ro
      - caddy-https-data:/data
      - caddy-https-config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8443:8443"    # reflection  → https://host:8443
      - "8470:8470"    # mcp http    → https://host:8470/mcp
      - "8499:8499"    # mcp web UI  → https://host:8499
      - "8490:8490"    # api         → https://host:8490
      - "9443:9443"    # minio S3    → https://host:9443

volumes:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
  caddy-https-data:
  caddy-https-config: