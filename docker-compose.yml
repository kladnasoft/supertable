# =====================================================================
# Supertable Services
# =====================================================================
#
# Quick start:
#   docker compose --profile infra --profile webui up -d
#   → Redis (:6379) + MinIO (:9000/:9001) + WebUI (:8050)
#
# Profiles:
#   infra       — Redis + MinIO (required by all services)
#   webui       — Admin UI + REST API proxy      :8050
#   api         — REST API (standalone)           :8051
#   odata       — OData 4.0 feed server          :8052
#   mcp         — MCP stdio + http + web app     :8070, :8099
#   mcp-http    — MCP over HTTPS (with Caddy)    :8070
#   https       — Caddy TLS sidecar (combinable)
#
# Examples:
#   docker compose --profile infra --profile webui up -d
#   docker compose --profile infra --profile webui --profile odata up -d
#   docker compose --profile infra --profile api --profile mcp up -d
#   docker compose --profile infra --profile webui --profile https up -d
# =====================================================================

x-common-env: &common-env
  DUCKDB_EXTENSION_DIRECTORY: ${DUCKDB_EXTENSION_DIRECTORY:-~/.duckdb/extensions}
  SUPERTABLE_HOME: ${SUPERTABLE_HOME:-/app}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SUPERTABLE_REDIS_HOST: redis
  SUPERTABLE_REDIS_PORT: 6379

x-storage-env: &storage-env
  STORAGE_ENDPOINT_URL: ${STORAGE_ENDPOINT_URL:-http://minio:9000}
  STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin123!}
  STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}

services:

  # =====================================================================
  # infra — Redis + MinIO
  # Start with:  docker compose --profile infra up -d
  # Required by all Supertable services.
  # =====================================================================

  redis:
    image: redis:7-alpine
    profiles: ["infra"]
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy noeviction
    volumes:
      - redis-data:/data
    networks:
      - supertable-net
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  minio:
    image: minio/minio:latest
    profiles: ["infra"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin123!}
    volumes:
      - minio-data:/data
    networks:
      - supertable-net
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Auto-create the default bucket on first run
  minio-init:
    image: minio/mc:latest
    profiles: ["infra"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set st http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123!} &&
        mc mb --ignore-existing st/$${STORAGE_BUCKET:-supertable} &&
        echo 'Bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin123!}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-supertable}
    networks:
      - supertable-net

  # =====================================================================
  # webui — Supertable admin UI + API reverse proxy
  # Start with:  docker compose --profile infra --profile webui up -d
  # URL:         http://localhost:8050
  #
  # The WebUI renders HTML pages and proxies all /reflection/* JSON
  # calls to the API server via httpx (co-located on :8051).
  # =====================================================================

  supertable-webui:
    build: .
    profiles: ["webui"]
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: webui
      SUPERTABLE_HOST: 0.0.0.0
      SUPERTABLE_UI_PORT: ${SUPERTABLE_UI_PORT:-8050}
      SUPERTABLE_SUPERUSER_TOKEN: ${SUPERTABLE_SUPERUSER_TOKEN:?Set SUPERTABLE_SUPERUSER_TOKEN in .env}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-0}
    networks:
      - supertable-net
    ports:
      - "${SUPERTABLE_UI_PORT:-8050}:${SUPERTABLE_UI_PORT:-8050}"

  # =====================================================================
  # api — Supertable REST API (standalone)
  # Start with:  docker compose --profile infra --profile api up -d
  # URL:         http://localhost:8051
  # =====================================================================

  supertable-api:
    build: .
    profiles: ["api"]
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: api
      SUPERTABLE_HOST: 0.0.0.0
      SUPERTABLE_API_PORT: ${SUPERTABLE_API_PORT:-8051}
      SUPERTABLE_SUPERUSER_TOKEN: ${SUPERTABLE_SUPERUSER_TOKEN:?Set SUPERTABLE_SUPERUSER_TOKEN in .env}
      UVICORN_RELOAD: ${UVICORN_RELOAD:-0}
    networks:
      - supertable-net
    ports:
      - "${SUPERTABLE_API_PORT:-8051}:${SUPERTABLE_API_PORT:-8051}"

  # =====================================================================
  # odata — Supertable OData 4.0 feed server
  # Start with:  docker compose --profile infra --profile odata up -d
  # URL:         http://localhost:8052
  # =====================================================================

  supertable-odata:
    build: .
    profiles: ["odata"]
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: odata
      SUPERTABLE_ODATA_HOST: 0.0.0.0
      SUPERTABLE_ODATA_PORT: ${SUPERTABLE_ODATA_PORT:-8052}
      SUPERTABLE_SUPERUSER_TOKEN: ${SUPERTABLE_SUPERUSER_TOKEN:?Set SUPERTABLE_SUPERUSER_TOKEN in .env}
    networks:
      - supertable-net
    ports:
      - "${SUPERTABLE_ODATA_PORT:-8052}:${SUPERTABLE_ODATA_PORT:-8052}"

  # =====================================================================
  # mcp — MCP stdio server + HTTP/web app
  # Start with:  docker compose --profile infra --profile mcp up -d
  # Endpoints:   http://localhost:8099/mcp
  #              http://localhost:8099/web
  #              http://localhost:8099/simulation
  # =====================================================================

  supertable-mcp:
    build: .
    profiles: ["mcp"]
    init: true
    restart: unless-stopped
    stdin_open: true
    tty: true
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: mcp
      SUPERTABLE_MCP_TRANSPORT: stdio
      SUPERTABLE_MCP_PORT: ${SUPERTABLE_MCP_PORT:-8070}
      SUPERTABLE_MCP_TOKEN: ${SUPERTABLE_MCP_TOKEN:-}
      SUPERTABLE_ALLOWED_ROLES: ${SUPERTABLE_ALLOWED_ROLES:-}
      FORWARDED_ALLOW_IPS: "*"
      UVICORN_PROXY_HEADERS: "1"
      SUPERTABLE_ALLOWED_HOSTS: "*"
    networks:
      - supertable-net
    ports:
      - "8099:8099"
      - "${SUPERTABLE_MCP_PORT:-8070}:${SUPERTABLE_MCP_PORT:-8070}"

  # =====================================================================
  # mcp-http — MCP server over streamable-http (for remote HTTP clients)
  # Start with:  docker compose --profile infra --profile mcp-http up -d
  # Endpoint:    https://localhost:8070/mcp  (TLS via caddy-mcp sidecar)
  # =====================================================================

  supertable-mcp-http:
    build: .
    profiles: ["mcp-http"]
    init: true
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      <<: [*common-env, *storage-env]
      SERVICE: mcp-http
      SUPERTABLE_MCP_TRANSPORT: streamable-http
      SUPERTABLE_MCP_PORT: 8000
      SUPERTABLE_MCP_TOKEN: ${SUPERTABLE_MCP_TOKEN:-}
      FORWARDED_ALLOW_IPS: "*"
      UVICORN_PROXY_HEADERS: "1"
    networks:
      - supertable-net

  caddy-mcp:
    image: caddy:2-alpine
    profiles: ["mcp-http"]
    restart: unless-stopped
    depends_on:
      - supertable-mcp-http
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - supertable-net
    ports:
      - "8070:8070"

  # =====================================================================
  # caddy-https — Universal TLS sidecar for all services
  # Combine with any other profile to add HTTPS:
  #
  #   docker compose --profile infra --profile webui --profile https up -d
  #   docker compose --profile infra --profile webui --profile odata --profile https up -d
  #
  # Ports (HTTPS → HTTP internal):
  #   8443  webui
  #   8451  api
  #   8452  odata
  #   8470  mcp + web + simulation
  #   9443  minio S3 API
  # =====================================================================

  caddy-https:
    image: caddy:2-alpine
    profiles: ["https"]
    restart: unless-stopped
    volumes:
      - ./Caddyfile.https:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy-https-data:/data
      - caddy-https-config:/config
    networks:
      - supertable-net
    ports:
      - "8443:8443"
      - "8451:8451"
      - "8452:8452"
      - "8470:8470"
      - "9443:9443"

networks:
  supertable-net:
    name: supertable-net

volumes:
  redis-data:
  minio-data:
  caddy-data:
  caddy-config:
  caddy-https-data:
  caddy-https-config:
